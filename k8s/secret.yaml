# ============================================================
# KubeWhisperer Secrets
# ============================================================
# DO NOT commit real values. Fill in base64-encoded secrets.
#
# To encode a value:
#   Linux/Mac:  echo -n "your-value" | base64
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-value"))
#
# Apply with: kubectl apply -f k8s/secret.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: kubewhisperer-secrets
  namespace: default
type: Opaque
data:
  GEMINI_API_KEY: <base64-encoded-gemini-api-key>
  KUBEWHISPERER_API_KEY: <base64-encoded-shared-secret>