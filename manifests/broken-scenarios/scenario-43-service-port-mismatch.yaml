apiVersion: v1
kind: Pod
metadata:
  name: scenario-43-port-mismatch
  labels:
    scenario: "43"
    category: network
    app: scenario-43
spec:
  containers:
  - name: crasher
    image: busybox
    command: ["/bin/sh", "-c"]
    args: ["echo 'server listening on :8080'; sleep 3600"]
    ports:
    - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: scenario-43-svc
spec:
  selector:
    app: scenario-43
  ports:
  - port: 80
    targetPort: 3000
