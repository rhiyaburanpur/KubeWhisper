apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scenario-45-bad-ingress
  labels:
    scenario: "45"
    category: network
spec:
  rules:
  - host: scenario-45.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nonexistent-backend-svc
            port:
              number: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: scenario-45-ingress-fail
  labels:
    scenario: "45"
    category: network
spec:
  containers:
  - name: crasher
    image: busybox
    command: ["/bin/sh", "-c"]
    args: ["echo 'ERROR: ingress backend service not found'; exit 1"]
