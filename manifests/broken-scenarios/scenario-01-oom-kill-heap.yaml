apiVersion: v1
kind: Pod
metadata:
  name: scenario-01-oom-heap
  labels:
    scenario: "01"
    category: resource
spec:
  containers:
  - name: crasher
    image: python:3.11-slim
    command: ["/bin/sh", "-c"]
    args: ["python3 -c \"data = []; [data.append(' ' * 10**6) for _ in range(1000)]\""]
    resources:
      limits:
        memory: "32Mi"
