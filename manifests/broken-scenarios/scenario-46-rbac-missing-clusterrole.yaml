apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scenario-46-bad-binding
  labels:
    scenario: "46"
    category: network
subjects:
- kind: ServiceAccount
  name: default
  namespace: default
roleRef:
  kind: ClusterRole
  name: nonexistent-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Pod
metadata:
  name: scenario-46-missing-role
  labels:
    scenario: "46"
    category: network
spec:
  containers:
  - name: crasher
    image: busybox
    command: ["/bin/sh", "-c"]
    args: ["echo 'FATAL: clusterroles.rbac.authorization.k8s.io nonexistent-cluster-role not found'; exit 1"]
