apiVersion: v1
kind: Pod
metadata:
  name: scenario-15-startup
  labels:
    scenario: "15"
    category: resource
spec:
  containers:
  - name: crasher
    image: busybox
    command: ["/bin/sh", "-c", "sleep 3600"]
    startupProbe:
      exec:
        command: ["/bin/sh", "-c", "exit 1"]
      failureThreshold: 2
      periodSeconds: 3
